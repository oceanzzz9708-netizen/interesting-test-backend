<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>测测你是甄嬛传里的谁？</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #C9A86C;
            --secondary: #E8DCC4;
            --accent: #8B4D4D;
            --bg: #FAF8F5;
            --card-bg: #FFFFFF;
            --text: #2D3748;
            --text-light: #718096;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #FAF8F5 0%, #F5F0E8 50%, #FDF8F8 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(201, 168, 108, 0.12) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(139, 77, 77, 0.1) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cover {
            text-align: center;
            padding: 60px 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(201, 168, 108, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(201, 168, 108, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 25px 80px rgba(201, 168, 108, 0.4); }
        }

        .logo svg {
            width: 60px;
            height: 60px;
            fill: white;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(135deg, var(--primary) 0%, #B8956A 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(201, 168, 108, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(201, 168, 108, 0.5);
        }

        .progress-container {
            margin-bottom: 40px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .progress-bar {
            height: 6px;
            background: var(--secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 60px rgba(0, 0, 0, 0.05);
        }

        .question-number {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .question-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option {
            padding: 18px 24px;
            background: var(--bg);
            border: 2px solid transparent;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option:hover {
            background: var(--card-bg);
            border-color: var(--secondary);
            transform: translateX(8px);
        }

        .option-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--bg) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .result {
            text-align: center;
            padding: 40px 20px;
        }

        .result-badge {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--accent) 0%, #A66 100%);
            border-radius: 20px;
            font-size: 0.9rem;
            color: white;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 1.3rem;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .character-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .character-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .character-card:nth-child(1) { animation-delay: 0.1s; }
        .character-card:nth-child(2) { animation-delay: 0.2s; }
        .character-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .character-card.first {
            border: 2px solid var(--accent);
            background: linear-gradient(135deg, #FDF8F8 0%, var(--card-bg) 100%);
        }

        .character-rank {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .character-card.first .character-rank {
            background: linear-gradient(135deg, var(--accent) 0%, #A66 100%);
            color: white;
        }

        .character-card:not(.first) .character-rank {
            background: var(--bg);
            color: var(--text-light);
        }

        .character-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--bg) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .character-info {
            text-align: left;
            flex: 1;
        }

        .character-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .character-desc {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .character-match {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .result-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: var(--secondary);
        }

        @media (max-width: 480px) {
            .title { font-size: 1.8rem; }
            .question-card { padding: 30px 20px; }
            .question-title { font-size: 1.3rem; }
            .character-card { padding: 20px; }
            .btn { padding: 14px 36px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    
    <div class="container">

            Object.keys(characters).forEach(char => {
                scores[char] = 0;
            });
        }

        function getApiUrl() {
            return window.location.origin;
        }

        async function verifyKey() {
            const key = document.getElementById('key-input').value.trim();
            const errorEl = document.getElementById('key-error');
            
            if (!key) {
                errorEl.textContent = '请输入密钥';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(getApiUrl() + '/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: key })
                });
                const data = await response.json();
                
                if (data.valid) {
                    localStorage.setItem('test_key', key);
                    document.getElementById('verified-key').textContent = key;
                    showPage('page-cover');
                    errorEl.style.display = 'none';
                } else {
                    errorEl.textContent = data.error || '密钥无效';
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                console.error('API错误:', e);
                localStorage.setItem('test_key', key);
                document.getElementById('verified-key').textContent = key;
                showPage('page-cover');
            }
        }

        function checkKeyOnLoad() {
            const savedKey = localStorage.getItem('test_key');
            if (savedKey) {
                document.getElementById('verified-key').textContent = savedKey;
                showPage('page-cover');
            } else {
                showPage('page-key');
            }
        }

        window.onload = checkKeyOnLoad;

        function startTest() {
            init();
            currentQuestion = 0;
            showPage('page-question');
            renderQuestion();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('progress-percent').textContent = ((currentQuestion + 1) / 10 * 100) + '%';
            document.getElementById('progress-fill').style.width = ((currentQuestion + 1) / 10 * 100) + '%';
            document.getElementById('q-number').textContent = `问题 ${currentQuestion + 1}`;
            document.getElementById('q-title').textContent = q.title;

            const optionsHtml = q.options.map((opt, i) => `
                <div class="option" onclick="selectOption(${i})">
                    <div class="option-icon">${opt.icon}</div>
                    <span>${opt.text}</span>
                </div>
            `).join('');
            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectOption(optionIndex) {
            const q = questions[currentQuestion];
            const selected = q.options[optionIndex];

            Object.entries(selected.roleScores).forEach(([char, score]) => {
                if (scores[char] !== undefined) {
                    scores[char] += score;
                }
            });

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            showPage('page-result');

            const sorted = Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            const maxScore = sorted[0][1];
            const characterListHtml = sorted.map(([char, score], index) => {
                const matchRate = Math.round((score / maxScore) * 100);
                const isFirst = index === 0;
                const charData = characters[char] || { avatar: "👤", desc: "" };
                
                return `
                    <div class="character-card ${isFirst ? 'first' : ''}">
                        <div class="character-rank">${index + 1}</div>
                        <div class="character-avatar">${charData.avatar}</div>
                        <div class="character-info">
                            <div class="character-name">${char}</div>
                            <div class="character-desc">${charData.desc}</div>
                        </div>
                        <div class="character-match">${matchRate}%</div>
                    </div>
                `;
            }).join('');

            document.getElementById('character-list').innerHTML = characterListHtml;
        }

        function shareResult() {
            const sorted = Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);
            
            const text = `我是甄嬛传里的${sorted[0][0]}！\n快来测测你是谁~`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('结果已复制到剪贴板！');
                });
            } else {
                prompt('复制以下内容分享:', text);
            }
        }

        function restartTest() {
            startTest();
        }
    </script>
</body>
</html>
